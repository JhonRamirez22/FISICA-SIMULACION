<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElectroSim 2D - Monte Carlo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="panel">
        <h1>ElectroSim 2D</h1>

        <div class="row">
          <button id="startStopBtn">Start</button>
          <button id="resetBtn">Reset ±</button>
        </div>

        <div class="row">
          <button id="resetPositiveBtn" title="Etapa 1: solo cargas +1">Reset solo +1</button>
          <button id="recordBtn">⏺ Grabar</button>
        </div>

        <div class="row">
          <button id="saveInitialBtn">Guardar inicial</button>
          <button id="exportLogBtn">Guardar registro</button>
          <label class="inline">
            <input id="showInitialToggle" type="checkbox" checked />
            Comparar inicial
          </label>
        </div>

        <label>
          Δ movimiento
          <input id="deltaSlider" type="range" min="0.02" max="1.0" step="0.01" value="0.22" />
          <span id="deltaValue">0.22</span>
        </label>

        <label>
          Velocidad (pasos/frame)
          <input id="speedSlider" type="range" min="1" max="500" step="1" value="120" />
          <span id="speedValue">120</span>
        </label>

        <label class="inline">
          <input id="potentialToggle" type="checkbox" checked />
          Mostrar potencial
        </label>

        <label class="inline">
          <input id="fieldToggle" type="checkbox" checked />
          Mostrar campo
        </label>

        <label class="inline">
          <input id="annealToggle" type="checkbox" />
          Simulated annealing
        </label>

        <label>
          Temperatura
          <input id="tempSlider" type="range" min="0.001" max="1.0" step="0.001" value="0.08" />
          <span id="tempValue">0.080</span>
        </label>

        <label>
          Signo al crear
          <select id="newChargeSign">
            <option value="1">+1 (rojo)</option>
            <option value="-1">-1 (azul)</option>
          </select>
        </label>

        <div class="stats">
          <p id="energyLabel">U: 0.0000</p>
          <p id="acceptanceLabel">Aceptación: 0.00%</p>
          <p id="countLabel">Cargas: 0</p>
        </div>

        <div class="help">
          <p><strong>Interacción:</strong></p>
          <ul>
            <li>Click + arrastrar: mover carga</li>
            <li>Click vacío: crear carga</li>
            <li>Doble click en carga: cambiar signo</li>
            <li>Click derecho en carga: eliminar</li>
          </ul>
        </div>
      </aside>

      <main class="stage">
        <div id="viewport"></div>
        <canvas id="vectorOverlay"></canvas>
        <canvas id="energyCanvas" width="420" height="160"></canvas>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
